<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIA - tela Home</title>
    <link rel="stylesheet" href="style_home.css">
</head>
<body class="dark-mode">

    <header>
        <div class="logo-container">
            <div class="logo-container">
    <div class="logo-icon">
        <img src="assets/WhatsApp_Image_2026-02-24_at_17.10.01-removebg-preview.png" alt="Logo VIA" class="logo-img">
    </div>
    <h1 class="logo-text">VIA</h1>
</div>
            
        </div>

        <div class="header-right">
            <div class="theme-switch-wrapper">
                <span id="theme-label">Escuro</span>
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" checked />
                    <div class="slider round"></div>
                </label>
            </div>

            <nav>
                <a href="#" class="active">HOME</a>
                <a href="#">SOBRE</a>
                <a href="#">MINHA EMPRESA</a>
                <a href="#">AGENDA</a>
            </nav>
        </div>
    </header>

    <div class="divider"></div>

    <main class="hero">
        <div class="hero-left">
            <h2 class="hero-title">
                ROTAS <span id="verde">INTELIGENTES</span><br>
                ENTREGAS PERFEITAS
            </h2>
            
            <p class="hero-description">
                Solução urbana minimalista e tecnologia projetada para reduzir conflitos, 
                melhorar a fluidez do tráfego e contribuir com cidades inteligentes.
            </p>

            <button class="btn-comecar">
                Começar <span class="arrow">▶</span>
            </button>

            <div class="stats">
                <div class="stat-item">
                    <span class="stat-value">98%</span>
                    <span class="stat-label">Eficácia</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">3X</span>
                    <span class="stat-label">Mais rápido</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">90%</span>
                    <span class="stat-label">Segurança</span>
                </div>
            </div>
        </div>

        <div class="hero-right">
            <div class="image-container">
                <img src="assets/WhatsApp_Image_2026-02-24_at_17.10.01-removebg-preview.png" alt="Ilustração VIA" class="main-illustration">
                <div class="watermark-via">VIA</div>
            </div>
        </div>
    </main>

    <script>
        const toggleSwitch = document.querySelector('#checkbox');
        const themeLabel = document.querySelector('#theme-label');

        toggleSwitch.addEventListener('change', (e) => {
            if (e.target.checked) {
                document.body.classList.remove('light-mode');
                document.body.classList.add('dark-mode');
                themeLabel.textContent = "Escuro";
            } else {
                document.body.classList.remove('dark-mode');
                document.body.classList.add('light-mode');
                themeLabel.textContent = "Claro";
            }
        });
    </script>
</body>
</html>
