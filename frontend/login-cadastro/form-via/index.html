<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>VIA</title>
</head>
<body>

<section class="containerPai">
    <div class="card loginActive">

        <!-- ESQUERDA -->
        <div class="esquerda">
            <div class="formLogin">
                <h2 id="branco">LOGIN</h2>
                <form>
                    <input type="email" placeholder="Cnpj">
                    <input type="password" placeholder="Senha">
                    <button type="submit">ENTRAR</button>
                </form>
            </div>

            <div class="facaLogin">
                <h2>POSSUI UMA <br><span id="verde">CONTA</span>?</h2>
                <p>Realize seu login</p>
                <button class="loginButton">LOGIN</button>
            </div>
        </div>

        <!-- DIREITA -->
        <div class="direita">
            <div class="formCadastro">
                <h2 id="branco">CADASTRE-SE</h2>
                <form>
                    <input type="text" placeholder="Nome da empresa">
                    <input type="email" placeholder="Cnpj/CPF">
                    <input type="password" placeholder="Senha">
                    <input type="email" placeholder="E-mail">
                    <input type="password" placeholder="Confirmar senha">
                    <button type="submit">CADASTRAR</button>
                </form>
            </div>

            <div class="facaCadastro">
                <h2>BEM VINDO <br><span id="verde">VIA</span></h2>
                <p>Não possui usuário? Faça seu cadastro.</p>
                <button class="cadastroButton">CADASTRO</button>
            </div>
        </div>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
